<div class="page-container">
  <!-- Header: title (left) + create button (right) -->
  <div class="page-header">
    <h1 class="page-title">Lista de Tarefas</h1>
    <button mat-flat-button color="primary" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Criar Tarefa
    </button>
  </div>

  <!-- Loading indicator -->
  @if (isLoading()) {
    <div class="loading-container">
      <mat-spinner diameter="40" />
    </div>
  } @else {
    <!-- Task grid — 4 columns -->
    <div class="task-grid">
      @for (task of taskService.tasks(); track task.id) {
        <app-task-card
          [task]="task"
          (toggle)="onToggle($event)"
          (edit)="onEdit($event)"
          (delete)="onDelete($event)"
        />
      } @empty {
        <div class="empty-state">
          <mat-icon class="empty-icon">check_circle_outline</mat-icon>
          <h2 class="empty-heading">Nenhuma tarefa ainda</h2>
          <p class="empty-body">Comece criando sua primeira tarefa.</p>
          <button
            mat-flat-button
            color="primary"
            class="empty-cta"
            (click)="openCreateModal()"
          >
            Criar primeira tarefa
          </button>
        </div>
      }
    </div>
  }
</div>
